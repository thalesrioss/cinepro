name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'firebase/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Instalar deps das functions
        run: |
          cd firebase/functions
          npm install --no-audit --no-fund

      - name: Deploy functions
        run: |
          cd firebase
          firebase deploy --only functions --project cinepro-42971 --non-interactive --force

      - name: Deploy firestore rules (se houver)
        run: |
          cd firebase
          firebase deploy --only firestore:rules --project cinepro-42971 --non-interactive
        continue-on-error: true
