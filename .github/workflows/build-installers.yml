name: Build Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do build (ex: 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'v*'

jobs:
  # ──────────────── macOS .pkg ────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Calcular versão limpa (sem prefixo "v")
        id: ver
        run: |
          RAW="${{ inputs.version || github.ref_name }}"
          CLEAN="${RAW#v}"
          echo "version=$CLEAN" >> $GITHUB_OUTPUT
          echo "Versão: $CLEAN"

      - name: Build .pkg (Mac)
        run: |
          chmod +x installer/mac/build.sh
          ./installer/mac/build.sh ${{ steps.ver.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: CinePRO-macOS
          path: installer/dist/CinePRO.pkg
          if-no-files-found: error

  # ──────────────── Windows .exe ────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Electron desktop app
        shell: pwsh
        run: |
          cd desktop-app
          npm install --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { throw "npm install failed" }
          npx electron-builder --win --dir
          if ($LASTEXITCODE -ne 0) { throw "electron-builder failed" }

      - name: Verify electron-builder output
        shell: pwsh
        run: |
          Write-Host "=== installer/dist contents ==="
          Get-ChildItem installer/dist -ErrorAction SilentlyContinue
          if (!(Test-Path "installer/dist/win-unpacked")) {
            throw "ERROR: installer/dist/win-unpacked not found - electron-builder did not produce output"
          }
          Write-Host "=== win-unpacked first 10 entries ==="
          Get-ChildItem installer/dist/win-unpacked | Select-Object -First 10

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compute clean version
        id: ver
        shell: pwsh
        run: |
          $raw = "${{ inputs.version || github.ref_name }}"
          $clean = $raw.TrimStart('v')
          "version=$clean" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $clean"

      - name: Compile Inno Setup installer
        shell: pwsh
        run: |
          cd installer/windows
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' /DMyAppVersion="${{ steps.ver.outputs.version }}" CinePRO.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed" }
          Write-Host "=== installer/dist after Inno Setup ==="
          Get-ChildItem ../dist

      - uses: actions/upload-artifact@v4
        with:
          name: CinePRO-Windows
          path: installer/dist/CinePRO-Setup.exe
          if-no-files-found: error

  # ──────────────── Release (só em tag) ────────────────
  release:
    needs: [build-mac, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Listar artifacts
        run: ls -la artifacts/ artifacts/*/
      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/CinePRO-macOS/CinePRO.pkg
            artifacts/CinePRO-Windows/CinePRO-Setup.exe
          generate_release_notes: true
          make_latest: 'true'
