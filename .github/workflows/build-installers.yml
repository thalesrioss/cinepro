name: Build Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do build (ex: 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'v*'

jobs:
  # ──────────────── macOS .pkg ────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build .pkg
        run: |
          chmod +x installer/mac/build.sh
          ./installer/mac/build.sh ${{ inputs.version || github.ref_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: CinePRO-macOS
          path: installer/dist/CinePRO-*.pkg
          if-no-files-found: error

  # ──────────────── Windows .exe ────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Compilar .exe
        shell: powershell
        run: |
          cd installer/windows
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' /DMyAppVersion="${{ inputs.version || github.ref_name }}" CinePRO.iss
      - uses: actions/upload-artifact@v4
        with:
          name: CinePRO-Windows
          path: installer/dist/CinePRO-*.exe
          if-no-files-found: error

  # ──────────────── Release ────────────────
  release:
    needs: [build-mac, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/CinePRO-macOS/*.pkg
            artifacts/CinePRO-Windows/*.exe
          generate_release_notes: true
