<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #07090F 0%, #11161D 100%);
    color: #fff;
    padding: 40px;
    margin: 0;
  }
  .check {
    font-size: 48px;
    color: #00B8FF;
    filter: drop-shadow(0 0 20px rgba(0,184,255,0.6));
  }
  h1 { font-size: 22px; margin: 16px 0 8px; }
  .tagline { color: #8A95A8; font-size: 13px; }
  h2 { font-size: 14px; margin-top: 28px; color: #fff; }
  ol { font-size: 13px; color: #C8D0DC; line-height: 1.8; padding-left: 22px; }
  ol::marker, li::marker { color: #00B8FF; font-weight: bold; }
  .accent { color: #00B8FF; font-weight: 600; }
</style></head>
<body>
  <div class="check">✓</div>
  <h1>Instalação concluída!</h1>
  <div class="tagline">CinePRO está pronto pra usar.</div>

  <h2>Como abrir no Premiere</h2>
  <ol>
    <li>Abra o <span class="accent">Adobe Premiere Pro</span></li>
    <li>Vá em <span class="accent">Janela → Extensões → CinePRO</span></li>
    <li>Faça login com a sua conta</li>
    <li>Arraste efeitos pra timeline 🎬</li>
  </ol>

  <p style="margin-top: 32px; font-size: 11px; color: #4A5566;">
    Problemas? Suporte: thales@cinepro.com
  </p>
</body></html>
