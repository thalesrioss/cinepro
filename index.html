<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CinePRO</title>
  <!-- ?v= = cache-bust: força o CEP/Chromium a recarregar JS/CSS a cada
       versão (senão o cache do CEP roda o codigo antigo apos atualizar).
       BUMPAR junto com PLUGIN_VERSION a cada release. -->
  <link rel="stylesheet" href="css/tokens.css?v=1.0.6">
  <link rel="stylesheet" href="css/style.css?v=1.0.6">

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- CEP + App -->
  <script src="js/CSInterface.js?v=1.0.6"></script>
  <script src="js/config.js?v=1.0.6"></script>
  <script src="js/update-checker.js?v=1.0.6" defer></script>
  <script src="js/lut-preview.js?v=1.0.6" defer></script>
  <script src="js/recipes.js?v=1.0.6" defer></script>
  <script src="js/subtitles.js?v=1.0.6" defer></script>
  <script src="js/main.js?v=1.0.6" defer></script>
</head>
<body>

<!-- ══ TELA DE LOGIN ══════════════════════════════════════════ -->
<div id="login-overlay" class="login-overlay">
  <div class="login-box">

    <div class="login-logo">
      <img src="icons/logo.jpg" alt="CinePRO" class="login-logo-img">
      <div class="login-logo-sub">Pack de efeitos profissionais</div>
    </div>

    <div>
      <div class="login-title">Acesse sua conta</div>
      <div class="login-subtitle" style="margin-top:6px;">
        Use o e-mail da sua assinatura ativa.
      </div>
    </div>

    <div class="input-group">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="off">
    </div>

    <div class="input-group">
      <label>Senha</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>

    <div id="login-error" class="login-error"></div>
    <div id="login-success" class="login-success"></div>

    <button id="btn-login" class="btn btn--primary btn--lg btn--block">Entrar</button>

    <div class="login-forgot">
      <a href="#" id="link-forgot-password">Esqueci minha senha</a>
    </div>

    <div class="login-footer">
      Não tem acesso? <a href="#" id="link-subscribe">Assinar agora</a>
    </div>

  </div>
</div>

<!-- ══ SEM ASSINATURA ATIVA ══════════════════════════════════ -->
<div id="no-access-overlay" class="login-overlay hidden">
  <div class="login-box">

    <div class="login-logo">
      <img src="icons/logo.jpg" alt="CinePRO" class="login-logo-img">
    </div>

    <div class="no-access-box">
      <div class="no-access-icon">🔒</div>
      <div class="no-access-title">Assinatura inativa</div>
      <div class="no-access-desc">
        Sua assinatura está inativa ou expirou.<br>
        Renove para continuar usando o CinePRO.
      </div>
      <button id="btn-subscribe" class="btn btn--primary-gradient btn--lg btn--block">Reativar assinatura</button>
      <button id="btn-logout-no-access" class="btn btn--ghost btn--sm btn--block">Sair / trocar conta</button>
    </div>

  </div>
</div>

<!-- ══ APP PRINCIPAL ══════════════════════════════════════════ -->
<div id="app-content" class="hidden">

  <!-- HEADER -->
  <header class="app-header">
    <img src="icons/logo.jpg" alt="CinePRO" class="app-header-logo-img">
    <div class="app-header-actions">
      <div id="update-pill-slot"></div>
      <div class="user-badge" id="user-email-badge">—</div>
      <button class="btn btn--ghost btn--icon" id="btn-logout" title="Sair">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" id="search-input" placeholder="Buscar em todos os efeitos...">
      <button class="search-clear" id="search-clear" title="Limpar" style="display:none;">✕</button>
    </div>
    <div class="view-toggle">
      <button class="view-toggle-btn" id="view-list-btn" title="Lista" aria-label="Ver em lista">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="view-toggle-btn" id="view-grid-btn" title="Grade" aria-label="Ver em grade">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
    </div>
  </div>

  <!-- LAYOUT: SIDEBAR + GRID -->
  <div class="layout-split">

    <!-- SIDEBAR — árvore de pastas (gerada pelo JS) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner" id="sidebar-tree">
        <div class="sidebar-skeleton">Carregando categorias...</div>
      </div>
    </aside>

    <!-- EFFECTS GRID -->
    <div class="effects-container" id="effects-container">
      <div class="effects-grid" id="effects-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>

  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-dot loading" id="status-dot"></div>
    <div class="status-text" id="status-text">Conectando...</div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- (modal preview removido — preview agora é inline no card) -->

</body>
</html>
